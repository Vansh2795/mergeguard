<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <!-- Owl logo group -->
  <g fill="none" stroke="#000" stroke-linecap="round" stroke-linejoin="round">
    <!-- Branch lines converging to owl -->
    <path d="M 20 10 L 100 80" stroke-width="3.5"/>
    <path d="M 180 10 L 100 80" stroke-width="3.5"/>

    <!-- Tick marks on branches (alternating sides) -->
    <!-- Left branch: first tick on right side -->
    <line x1="45" y1="27" x2="48" y2="23" stroke-width="3"/>
    <!-- Left branch: second tick on left side -->
    <line x1="70" y1="44" x2="67" y2="48" stroke-width="3"/>
    <!-- Right branch: first tick on left side -->
    <line x1="155" y1="27" x2="152" y2="23" stroke-width="3"/>
    <!-- Right branch: second tick on right side -->
    <line x1="130" y1="44" x2="133" y2="48" stroke-width="3"/>

    <!-- Owl head (round) -->
    <circle cx="100" cy="95" r="30" stroke-width="3.5"/>

    <!-- Ear tufts -->
    <path d="M 76 72 L 72 55 L 82 68" stroke-width="3" fill="#000"/>
    <path d="M 124 72 L 128 55 L 118 68" stroke-width="3" fill="#000"/>

    <!-- Left eye -->
    <circle cx="87" cy="92" r="12" stroke-width="3"/>
    <circle cx="89" cy="91" r="5.5" fill="#000" stroke="none"/>

    <!-- Right eye -->
    <circle cx="113" cy="92" r="12" stroke-width="3"/>
    <circle cx="115" cy="91" r="5.5" fill="#000" stroke="none"/>

    <!-- Beak -->
    <path d="M 97 102 L 100 110 L 103 102" stroke-width="2.5" fill="#000"/>

    <!-- Body -->
    <path d="M 74 118 Q 72 150 85 170 Q 100 185 115 170 Q 128 150 126 118" stroke-width="3.5"/>

    <!-- Wing detail left -->
    <path d="M 76 125 Q 65 145 78 160" stroke-width="2.5"/>

    <!-- Wing detail right -->
    <path d="M 124 125 Q 135 145 122 160" stroke-width="2.5"/>

    <!-- Chest feather pattern -->
    <path d="M 92 125 L 100 135 L 108 125" stroke-width="2"/>
    <path d="M 90 135 L 100 145 L 110 135" stroke-width="2"/>

    <!-- Tail / merge output line -->
    <path d="M 100 170 L 100 195" stroke-width="3.5"/>
  </g>

  <!-- Wordmark -->
  <text x="220" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#000" letter-spacing="-0.5">MergeGuard</text>
</svg>
