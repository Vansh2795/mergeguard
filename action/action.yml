name: "MergeGuard"
description: "Cross-PR conflict detection for AI-heavy repositories"
author: "MergeGuard"

inputs:
  github-token:
    description: "GitHub token with PR read/write access"
    required: true
  anthropic-api-key:
    description: "Anthropic API key for LLM-powered analysis (optional)"
    required: false
  risk-threshold:
    description: "Only comment if risk score exceeds this value (0-100)"
    default: "0"
  fail-on-risk:
    description: "Fail the check when risk exceeds threshold"
    default: "false"
  max-open-prs:
    description: "Maximum number of open PRs to analyze (safety cap)"
    default: "200"
  max-pr-age:
    description: "Only scan PRs updated within this many days"
    default: "30"
  config-path:
    description: "Path to .mergeguard.yml config file"
    default: ".mergeguard.yml"
  github-url:
    description: "GitHub Enterprise Server URL (e.g., https://github.example.com)"
    required: false
  merge-queue:
    description: "Enable merge queue integration (posts commit status)"
    default: "false"
  block-severity:
    description: "Minimum severity to block merge (critical/warning/info)"
    default: "critical"

outputs:
  risk-score:
    description: "The calculated risk score (0-100)"
  conflict-count:
    description: "Number of conflicts detected"
  report-json:
    description: "Full analysis report in JSON format"

runs:
  using: "docker"
  image: "Dockerfile"
  env:
    GITHUB_TOKEN: ${{ inputs.github-token }}
    ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
    MERGEGUARD_RISK_THRESHOLD: ${{ inputs.risk-threshold }}
    MERGEGUARD_MAX_OPEN_PRS: ${{ inputs.max-open-prs }}
    MERGEGUARD_MAX_PR_AGE_DAYS: ${{ inputs.max-pr-age }}
    MERGEGUARD_CONFIG_PATH: ${{ inputs.config-path }}
    MERGEGUARD_GITHUB_URL: ${{ inputs.github-url }}
    MERGEGUARD_MERGE_QUEUE: ${{ inputs.merge-queue }}
    MERGEGUARD_BLOCK_SEVERITY: ${{ inputs.block-severity }}
    MERGEGUARD_FAIL_ON_RISK: ${{ inputs.fail-on-risk }}

branding:
  icon: "shield"
  color: "blue"
